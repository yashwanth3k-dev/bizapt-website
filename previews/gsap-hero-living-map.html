<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizdaptive — GSAP Hero v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0f1c38;
        --accent: #1e3a8a;
        --soft: #7eb6ff;
        --mist: #d4e2f7;
        --fg: #101828;
        --muted: #4b5b76;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: Outfit, system-ui, sans-serif;
        color: var(--fg);
        background: #0b1428;
        overflow: hidden;
      }

      .hero {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        isolation: isolate;
      }

      /* Full-bleed atmospheric field */
      .field {
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(ellipse 80% 60% at 70% 40%, #1a3a6e 0%, transparent 55%),
          radial-gradient(ellipse 50% 40% at 15% 80%, #152a52 0%, transparent 50%),
          linear-gradient(165deg, #07101f 0%, #0f1c38 45%, #152445 100%);
      }

      .field__grain {
        position: absolute;
        inset: 0;
        opacity: 0.07;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
        will-change: transform;
      }

      .orb-a {
        width: 42vw;
        height: 42vw;
        max-width: 520px;
        max-height: 520px;
        right: -5%;
        top: 10%;
        background: radial-gradient(circle, rgba(94, 160, 255, 0.55), transparent 70%);
      }

      .orb-b {
        width: 30vw;
        height: 30vw;
        max-width: 360px;
        max-height: 360px;
        left: -8%;
        bottom: 5%;
        background: radial-gradient(circle, rgba(56, 100, 180, 0.45), transparent 70%);
      }

      .grid-floor {
        position: absolute;
        left: -10%;
        right: -10%;
        bottom: -15%;
        height: 55%;
        background:
          linear-gradient(transparent 0%, rgba(126, 182, 255, 0.04) 100%),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 48px,
            rgba(126, 182, 255, 0.08) 49px,
            transparent 50px
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 48px,
            rgba(126, 182, 255, 0.06) 49px,
            transparent 50px
          );
        transform: perspective(600px) rotateX(62deg);
        transform-origin: center top;
        mask-image: linear-gradient(to top, transparent, black 40%, transparent);
        opacity: 0.55;
        pointer-events: none;
      }

      .shell {
        position: relative;
        z-index: 2;
        width: min(1180px, 94vw);
        display: grid;
        gap: 2rem;
        align-items: center;
        padding: 3.5rem 0 2.5rem;
      }

      @media (min-width: 980px) {
        .shell {
          grid-template-columns: 1fr 1.05fr;
          gap: 1.5rem;
        }
      }

      .copy {
        color: #eef3fb;
        text-align: center;
      }

      @media (min-width: 980px) {
        .copy {
          text-align: left;
          padding-right: 1rem;
        }
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 1.5rem;
        opacity: 0;
      }

      .brand__mark {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid #9ec5ff;
        background:
          radial-gradient(circle at 50% 50%, #9ec5ff 0 32%, transparent 34%),
          rgba(255, 255, 255, 0.06);
        box-shadow:
          0 0 0 8px rgba(126, 182, 255, 0.12),
          0 0 28px rgba(126, 182, 255, 0.35);
      }

      .brand__name {
        font-size: clamp(1.35rem, 3vw, 1.85rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #f4f8ff;
      }

      h1 {
        font-family: Fraunces, Georgia, serif;
        font-size: clamp(2.6rem, 6.2vw, 4.4rem);
        line-height: 1.02;
        font-weight: 700;
        letter-spacing: -0.035em;
        color: #fff;
        opacity: 0;
      }

      h1 span {
        display: block;
        background: linear-gradient(110deg, #ffffff 20%, #9ec5ff 85%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sub {
        margin: 1.25rem auto 0;
        max-width: 32rem;
        font-size: 1.05rem;
        line-height: 1.65;
        color: rgba(210, 222, 242, 0.78);
        opacity: 0;
      }

      @media (min-width: 980px) {
        .sub {
          margin-left: 0;
        }
      }

      .ctas {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        opacity: 0;
      }

      @media (min-width: 980px) {
        .ctas {
          justify-content: flex-start;
        }
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        border-radius: 999px;
        padding: 0.9rem 1.35rem;
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid transparent;
        cursor: default;
        text-decoration: none;
      }

      .btn-primary {
        background: #eaf1ff;
        color: var(--accent);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(158, 197, 255, 0.28);
        color: #e8eef9;
        backdrop-filter: blur(8px);
      }

      /* 3D stage */
      .stage-wrap {
        position: relative;
        height: min(72vh, 560px);
        min-height: 360px;
        perspective: 1100px;
        opacity: 0;
      }

      .stage {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        transform: rotateX(18deg) rotateY(-18deg);
        will-change: transform;
      }

      .plate {
        position: absolute;
        left: 50%;
        top: 52%;
        width: min(78%, 420px);
        aspect-ratio: 1;
        margin: -38% 0 0 -39%;
        border-radius: 28px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(158, 197, 255, 0.22);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        transform: translateZ(-40px);
        overflow: hidden;
      }

      .plate::after {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(
          from 120deg,
          transparent 0%,
          rgba(126, 182, 255, 0.18) 20%,
          transparent 40%,
          transparent 60%,
          rgba(126, 182, 255, 0.12) 75%,
          transparent 100%
        );
        animation: spinPlate 14s linear infinite;
        opacity: 0.7;
      }

      @keyframes spinPlate {
        to {
          transform: rotate(360deg);
        }
      }

      .map {
        position: absolute;
        left: 50%;
        top: 48%;
        width: min(92%, 480px);
        aspect-ratio: 1;
        margin: -46% 0 0 -46%;
        transform-style: preserve-3d;
        transform: translateZ(40px);
      }

      .map svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .edge {
        fill: none;
        stroke: #9ec5ff;
        stroke-width: 1.6;
        stroke-linecap: round;
        opacity: 0;
      }

      .edge--ring {
        stroke-width: 1.1;
        stroke: rgba(158, 197, 255, 0.45);
      }

      .node {
        transform-box: fill-box;
        transform-origin: center;
      }

      .node .core {
        fill: #d7e8ff;
        filter: drop-shadow(0 0 6px rgba(158, 197, 255, 0.8));
      }

      .node .halo {
        fill: rgba(126, 182, 255, 0.18);
        stroke: rgba(158, 197, 255, 0.55);
        stroke-width: 1.5;
      }

      .hub .core {
        fill: #fff;
        filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.85));
      }

      .hub .halo {
        fill: rgba(158, 197, 255, 0.2);
        stroke: #fff;
        stroke-width: 2;
      }

      .spark {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 12px 4px rgba(158, 197, 255, 0.7);
        opacity: 0;
        pointer-events: none;
      }

      .float-card {
        position: absolute;
        padding: 0.55rem 0.8rem;
        border-radius: 12px;
        background: rgba(12, 24, 48, 0.72);
        border: 1px solid rgba(158, 197, 255, 0.28);
        color: #dce7f8;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        opacity: 0;
        white-space: nowrap;
      }

      .float-card--a {
        top: 8%;
        left: 2%;
        transform: translateZ(90px) rotateY(12deg);
      }

      .float-card--b {
        bottom: 14%;
        right: 0%;
        transform: translateZ(70px) rotateY(-10deg);
      }

      .float-card--c {
        top: 42%;
        left: -4%;
        transform: translateZ(110px) rotateY(16deg);
      }

      .hint {
        position: absolute;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(190, 208, 236, 0.45);
      }

      @media (prefers-reduced-motion: reduce) {
        .plate::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="field" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="grid-floor"></div>
        <div class="field__grain"></div>
      </div>

      <div class="shell">
        <div class="copy">
          <div class="brand">
            <span class="brand__mark" aria-hidden="true"></span>
            <span class="brand__name">Bizdaptive</span>
          </div>
          <h1><span>Adaptive Business Instinct</span></h1>
          <p class="sub">
            Knowledge connects. Context compounds. Every decision makes the
            business sharper than yesterday.
          </p>
          <div class="ctas">
            <span class="btn btn-primary">Join the waitlist →</span>
            <span class="btn btn-ghost">See how it works</span>
          </div>
        </div>

        <div class="stage-wrap" id="stageWrap">
          <div class="stage" id="stage">
            <div class="plate"></div>

            <div class="float-card float-card--a">Decision</div>
            <div class="float-card float-card--b">Evidence</div>
            <div class="float-card float-card--c">Context</div>

            <div class="map">
              <svg viewBox="0 0 400 400" aria-hidden="true">
                <defs>
                  <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#9ec5ff" stop-opacity="0" />
                    <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
                    <stop offset="100%" stop-color="#9ec5ff" stop-opacity="0" />
                  </linearGradient>
                  <filter id="glow">
                    <feGaussianBlur stdDeviation="2.5" result="b" />
                    <feMerge>
                      <feMergeNode in="b" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>

                <g filter="url(#glow)">
                  <line class="edge" id="e1" x1="200" y1="200" x2="95" y2="85" />
                  <line class="edge" id="e2" x1="200" y1="200" x2="305" y2="78" />
                  <line class="edge" id="e3" x1="200" y1="200" x2="335" y2="200" />
                  <line class="edge" id="e4" x1="200" y1="200" x2="300" y2="318" />
                  <line class="edge" id="e5" x1="200" y1="200" x2="100" y2="325" />
                  <line class="edge" id="e6" x1="200" y1="200" x2="62" y2="200" />

                  <line class="edge edge--ring" id="r1" x1="95" y1="85" x2="305" y2="78" />
                  <line class="edge edge--ring" id="r2" x1="305" y1="78" x2="335" y2="200" />
                  <line class="edge edge--ring" id="r3" x1="335" y1="200" x2="300" y2="318" />
                  <line class="edge edge--ring" id="r4" x1="300" y1="318" x2="100" y2="325" />
                  <line class="edge edge--ring" id="r5" x1="100" y1="325" x2="62" y2="200" />
                  <line class="edge edge--ring" id="r6" x1="62" y1="200" x2="95" y2="85" />
                </g>

                <g class="node hub" id="hub" transform="translate(200 200)">
                  <circle class="halo" r="26" />
                  <circle class="core" r="9" />
                </g>

                <g class="node sat" id="n1" transform="translate(95 85)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>
                <g class="node sat" id="n2" transform="translate(305 78)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>
                <g class="node sat" id="n3" transform="translate(335 200)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>
                <g class="node sat" id="n4" transform="translate(300 318)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>
                <g class="node sat" id="n5" transform="translate(100 325)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>
                <g class="node sat" id="n6" transform="translate(62 200)">
                  <circle class="halo" r="15" />
                  <circle class="core" r="5.5" />
                </g>

                <!-- traveling signal dots along edges -->
                <circle class="signal" id="s1" r="3.5" fill="#fff" opacity="0" />
                <circle class="signal" id="s2" r="3.5" fill="#fff" opacity="0" />
                <circle class="signal" id="s3" r="3.5" fill="#fff" opacity="0" />
              </svg>
            </div>
          </div>

          <span class="spark" id="spark1"></span>
          <span class="spark" id="spark2"></span>
          <span class="spark" id="spark3"></span>
        </div>
      </div>

      <p class="hint">GSAP preview v2 · mouse moves the depth</p>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MotionPathPlugin.min.js"></script>
    <script>
      (function () {
        gsap.registerPlugin(MotionPathPlugin);
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const sats = ["#n1", "#n2", "#n3", "#n4", "#n5", "#n6"];
        const spokes = ["#e1", "#e2", "#e3", "#e4", "#e5", "#e6"];
        const rings = ["#r1", "#r2", "#r3", "#r4", "#r5", "#r6"];
        const scatter = [
          { x: -70, y: -55 },
          { x: 80, y: -60 },
          { x: 95, y: 10 },
          { x: 70, y: 75 },
          { x: -65, y: 85 },
          { x: -95, y: 5 },
        ];

        // Measure edge lengths for dash draw
        [...spokes, ...rings].forEach((sel) => {
          const el = document.querySelector(sel);
          const len = el.getTotalLength();
          el.style.strokeDasharray = String(len);
          el.style.strokeDashoffset = String(len);
        });

        gsap.set([".brand", "h1", ".sub", ".ctas", ".stage-wrap"], {
          opacity: 0,
          y: 28,
        });
        gsap.set("#hub", { scale: 0.4, opacity: 0, transformOrigin: "center" });
        sats.forEach((sel, i) => {
          gsap.set(sel, {
            x: scatter[i].x,
            y: scatter[i].y,
            scale: 0.4,
            opacity: 0,
            transformOrigin: "center",
          });
        });
        gsap.set(".float-card", { opacity: 0, y: 16 });
        gsap.set(".signal", { opacity: 0 });

        if (reduced) {
          gsap.set([".brand", "h1", ".sub", ".ctas", ".stage-wrap", "#hub", ".sat", ".edge", ".float-card"], {
            clearProps: "all",
            opacity: 1,
            y: 0,
            x: 0,
            scale: 1,
          });
          [...spokes, ...rings].forEach((sel) => {
            document.querySelector(sel).style.strokeDashoffset = "0";
          });
          return;
        }

        const intro = gsap.timeline({ defaults: { ease: "power3.out" } });
        intro
          .to(".brand", { opacity: 1, y: 0, duration: 0.6 })
          .to("h1", { opacity: 1, y: 0, duration: 0.85 }, "-=0.3")
          .to(".sub", { opacity: 1, y: 0, duration: 0.65 }, "-=0.4")
          .to(".ctas", { opacity: 1, y: 0, duration: 0.55 }, "-=0.35")
          .to(".stage-wrap", { opacity: 1, y: 0, duration: 0.8 }, "-=0.65");

        const story = gsap.timeline({
          repeat: -1,
          repeatDelay: 0.6,
          defaults: { ease: "power2.inOut" },
        });

        story
          // Chaos scatter in
          .to(
            sats,
            {
              opacity: 1,
              scale: 1,
              duration: 0.55,
              stagger: 0.07,
              ease: "back.out(2)",
            },
            0
          )
          .to(
            sats,
            {
              x: (i) => scatter[i].x + gsap.utils.random(-14, 14),
              y: (i) => scatter[i].y + gsap.utils.random(-14, 14),
              duration: 0.85,
              stagger: 0.04,
              yoyo: true,
              repeat: 1,
            },
            0.35
          )
          // Hub ignites
          .to(
            "#hub",
            { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" },
            1.6
          )
          // Settle
          .to(
            sats,
            { x: 0, y: 0, duration: 1, stagger: 0.05, ease: "power3.inOut" },
            1.95
          )
          // Draw spokes
          .to(
            spokes,
            {
              opacity: 0.95,
              strokeDashoffset: 0,
              duration: 0.75,
              stagger: 0.08,
              ease: "power2.out",
            },
            2.5
          )
          // Draw ring
          .to(
            rings,
            {
              opacity: 0.55,
              strokeDashoffset: 0,
              duration: 0.6,
              stagger: 0.05,
            },
            3.15
          )
          // Floating labels
          .to(
            ".float-card",
            {
              opacity: 1,
              y: 0,
              duration: 0.55,
              stagger: 0.12,
              ease: "power3.out",
            },
            3.4
          )
          // Signal travel
          .add(() => {
            runSignals();
          }, 3.7)
          // Hub pulse
          .to(
            "#hub .halo",
            {
              attr: { r: 40 },
              opacity: 0.15,
              duration: 0.9,
              yoyo: true,
              repeat: 1,
              ease: "sine.inOut",
            },
            3.7
          )
          .to({}, { duration: 2.2 })
          // Tear down
          .to(".float-card", { opacity: 0, y: -10, duration: 0.35, stagger: 0.05 })
          .to(
            [...spokes, ...rings],
            {
              opacity: 0,
              duration: 0.4,
              stagger: 0.02,
              onComplete: () => {
                [...spokes, ...rings].forEach((sel) => {
                  const el = document.querySelector(sel);
                  el.style.strokeDashoffset = String(el.getTotalLength());
                });
              },
            },
            "<"
          )
          .to("#hub", { opacity: 0, scale: 0.45, duration: 0.35 }, "<0.1")
          .to(
            sats,
            {
              x: (i) => scatter[i].x,
              y: (i) => scatter[i].y,
              opacity: 0.25,
              duration: 0.5,
              stagger: 0.03,
            },
            "<"
          );

        function runSignals() {
          const paths = [
            { id: "#s1", edge: "#e1" },
            { id: "#s2", edge: "#e3" },
            { id: "#s3", edge: "#e5" },
          ];
          paths.forEach((p, i) => {
            gsap.fromTo(
              p.id,
              { opacity: 1 },
              {
                duration: 1.1,
                delay: i * 0.22,
                ease: "power1.inOut",
                motionPath: {
                  path: p.edge,
                  align: p.edge,
                  alignOrigin: [0.5, 0.5],
                  autoRotate: false,
                },
                onComplete: () => gsap.set(p.id, { opacity: 0 }),
              }
            );
          });

          // Sparks burst near hub
          ["#spark1", "#spark2", "#spark3"].forEach((sel, i) => {
            const wrap = document.getElementById("stageWrap").getBoundingClientRect();
            gsap.fromTo(
              sel,
              {
                opacity: 1,
                x: wrap.width * 0.48,
                y: wrap.height * 0.42,
                scale: 1,
              },
              {
                opacity: 0,
                x: wrap.width * (0.35 + i * 0.12),
                y: wrap.height * (0.2 + i * 0.1),
                scale: 0,
                duration: 0.9,
                delay: 0.15 * i,
                ease: "power2.out",
              }
            );
          });
        }

        // Ambient orb drift
        gsap.to(".orb-a", {
          x: 40,
          y: 30,
          duration: 7,
          yoyo: true,
          repeat: -1,
          ease: "sine.inOut",
        });
        gsap.to(".orb-b", {
          x: -30,
          y: -24,
          duration: 8,
          yoyo: true,
          repeat: -1,
          ease: "sine.inOut",
        });

        // Mouse parallax on the 3D stage
        const stage = document.getElementById("stage");
        const wrap = document.getElementById("stageWrap");
        let px = 0;
        let py = 0;
        let tx = 0;
        let ty = 0;

        wrap.addEventListener("pointermove", (e) => {
          const r = wrap.getBoundingClientRect();
          tx = ((e.clientX - r.left) / r.width - 0.5) * 2;
          ty = ((e.clientY - r.top) / r.height - 0.5) * 2;
        });
        wrap.addEventListener("pointerleave", () => {
          tx = 0;
          ty = 0;
        });

        gsap.ticker.add(() => {
          px += (tx - px) * 0.06;
          py += (ty - py) * 0.06;
          stage.style.transform = `rotateX(${18 - py * 8}deg) rotateY(${-18 + px * 12}deg)`;
        });
      })();
    </script>
  </body>
</html>
