<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizdaptive — Building Growth Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #eef2f9;
        --accent: #1e3a8a;
        --accent-soft: #93c5fd;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--bg);
        overflow: hidden;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          #f7f9fc 0%,
          #eef2f9 42%,
          #dfe7f4 78%,
          #cfd9eb 100%
        );
      }

      .stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .sky-glow {
        position: absolute;
        top: -10%;
        left: 50%;
        width: 70vw;
        height: 40vh;
        transform: translateX(-50%);
        background: radial-gradient(
          ellipse at center,
          rgba(147, 197, 253, 0.35),
          transparent 70%
        );
        animation: skyPulse 8s ease-in-out infinite;
      }

      @keyframes skyPulse {
        0%,
        100% {
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
      }

      .ground {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 26%;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(197, 208, 228, 0.45) 30%,
          rgba(180, 193, 216, 0.75) 100%
        );
      }

      .ground-line {
        position: absolute;
        left: 5%;
        right: 5%;
        bottom: 25.5%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(30, 58, 138, 0.25),
          transparent
        );
      }

      .building-wrap {
        position: absolute;
        left: 50%;
        bottom: 20%;
        width: min(560px, 86vw);
        height: min(68vh, 560px);
        transform: translateX(-50%);
      }

      .building {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .grow {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: bottom center;
        animation-fill-mode: both;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
        animation-iteration-count: infinite;
        animation-duration: 12s;
      }

      @keyframes riseIn {
        0%,
        4% {
          opacity: 0;
          transform: scaleY(0.05) translateY(8px);
        }
        12%,
        82% {
          opacity: 1;
          transform: scaleY(1) translateY(0);
        }
        92%,
        100% {
          opacity: 0;
          transform: scaleY(0.2) translateY(4px);
        }
      }

      @keyframes fadeSlide {
        0%,
        8% {
          opacity: 0;
          transform: translateY(10px);
        }
        16%,
        82% {
          opacity: 1;
          transform: translateY(0);
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes windowPop {
        0%,
        18% {
          opacity: 0;
          transform: scale(0.4);
        }
        26%,
        82% {
          opacity: 1;
          transform: scale(1);
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes roofIn {
        0%,
        28% {
          opacity: 0;
          transform: translateY(-16px) scale(0.85);
        }
        38%,
        82% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes antennaIn {
        0%,
        40% {
          opacity: 0;
          transform: scaleY(0);
        }
        48%,
        82% {
          opacity: 1;
          transform: scaleY(1);
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes beamDraw {
        0%,
        10% {
          stroke-dashoffset: 120;
          opacity: 0;
        }
        18%,
        82% {
          stroke-dashoffset: 0;
          opacity: 0.55;
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      .foundation {
        animation-name: riseIn;
        animation-delay: 0s;
      }
      .floor-1 {
        animation-name: riseIn;
        animation-delay: 0.6s;
      }
      .floor-2 {
        animation-name: riseIn;
        animation-delay: 1.4s;
      }
      .floor-3 {
        animation-name: riseIn;
        animation-delay: 2.2s;
      }
      .floor-4 {
        animation-name: riseIn;
        animation-delay: 3s;
      }
      .scaffold {
        stroke-dasharray: 120;
        animation-name: beamDraw;
        animation-delay: 0.8s;
        animation-timing-function: ease-out;
      }
      .window {
        transform-origin: center;
        animation-name: windowPop;
      }
      .w-row-1 {
        animation-delay: 1.8s;
      }
      .w-row-2 {
        animation-delay: 2.6s;
      }
      .w-row-3 {
        animation-delay: 3.4s;
      }
      .w-row-4 {
        animation-delay: 4.1s;
      }
      .roof {
        animation-name: roofIn;
        animation-delay: 0s;
      }
      .antenna {
        transform-origin: bottom center;
        animation-name: antennaIn;
      }
      .side-wing {
        animation-name: fadeSlide;
        animation-delay: 3.6s;
      }
      .door {
        animation-name: fadeSlide;
        animation-delay: 4.4s;
      }
      .dust {
        animation: dustRise 12s ease-in-out infinite;
      }

      /* People leaning out of windows + waving */
      .person {
        opacity: 0;
        animation: personIn 12s cubic-bezier(0.22, 1, 0.36, 1) infinite both;
      }
      .person-1 {
        animation-delay: 2.2s;
      }
      .person-2 {
        animation-delay: 2.5s;
      }
      .person-3 {
        animation-delay: 3.1s;
      }
      .person-4 {
        animation-delay: 3.5s;
      }
      .person-5 {
        animation-delay: 3.9s;
      }
      .person-6 {
        animation-delay: 4.5s;
      }

      @keyframes personIn {
        0%,
        8% {
          opacity: 0;
        }
        16%,
        82% {
          opacity: 1;
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      .wave-arm {
        /* No SVG transform on this node — CSS rotate must not wipe position */
        transform-origin: 0px 0px;
        animation: wave 0.65s ease-in-out infinite;
      }
      .person-2 .wave-arm {
        animation-delay: 0.1s;
      }
      .person-3 .wave-arm {
        animation-delay: 0.22s;
      }
      .person-4 .wave-arm {
        animation-delay: 0.08s;
      }
      .person-5 .wave-arm {
        animation-delay: 0.18s;
      }
      .person-6 .wave-arm {
        animation-delay: 0.3s;
      }

      @keyframes wave {
        0%,
        100% {
          transform: rotate(-32deg);
        }
        50% {
          transform: rotate(42deg);
        }
      }

      /* Problem bubbles — one person at a time, in sequence */
      .bubble {
        opacity: 0;
        pointer-events: none;
        animation: bubbleOnce 12s ease-in-out infinite both;
      }
      .bubble-1 {
        animation-delay: 3.5s;
      }
      .bubble-2 {
        animation-delay: 4.6s;
      }
      .bubble-3 {
        animation-delay: 5.7s;
      }
      .bubble-4 {
        animation-delay: 6.8s;
      }
      .bubble-5 {
        animation-delay: 7.9s;
      }
      .bubble-6 {
        animation-delay: 9s;
      }

      /* ~1.1s visible each, then waits for next loop */
      @keyframes bubbleOnce {
        0%,
        1% {
          opacity: 0;
        }
        4%,
        11% {
          opacity: 1;
        }
        14%,
        100% {
          opacity: 0;
        }
      }

      .bubble text {
        font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
        fill: #1e3a8a;
      }

      @keyframes dustRise {
        0%,
        8% {
          opacity: 0;
          transform: translateY(20px);
        }
        20% {
          opacity: 0.35;
        }
        45% {
          opacity: 0.15;
          transform: translateY(-40px);
        }
        60%,
        100% {
          opacity: 0;
          transform: translateY(-60px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .grow,
        .dust,
        .sky-glow,
        .person,
        .wave-arm,
        .bubble {
          animation: none !important;
        }
        .grow,
        .person,
        .bubble {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
